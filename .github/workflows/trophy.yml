name: GitHub-Profile-Trophy

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate trophy
        uses: ryo-ma/github-profile-trophy@main
        with:
          username: Faris-ibrahim2004
          theme: dracula

      - name: Push trophy
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: trophy-output
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
